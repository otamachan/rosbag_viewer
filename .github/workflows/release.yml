name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rosbag-viewer-app
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: rosbag-viewer-app
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: rosbag-viewer-app
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rosbag-viewer-app.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # build.rs handles npm ci + npm run build automatically
      - run: cargo build --release --target ${{ matrix.target }} -p rosbag-viewer-app
      - name: Package
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          dir="rosbag-viewer-app-${tag}-${{ matrix.name }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$dir/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "${dir}.zip" "$dir"
          else
            tar czf "${dir}.tar.gz" "$dir"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.name }}
          path: rosbag-viewer-app-*

  release:
    name: Create release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          generate_release_notes: true
