name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (clippy + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo build --release --workspace

  frontend-lib:
    name: Frontend lib (lint + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lib/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lib/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run check

  frontend-app:
    name: Frontend app (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      # lib/frontend is referenced via tsconfig paths — install its deps too
      - run: npm ci --prefix ../../lib/frontend
      - run: npm run lint
      - run: npm run build
